<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anchor Test</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
    }
    pre {
      white-space: pre-wrap;
      margin: 0;
      padding: 16px;
    }
    iframe {
      width: 390px;
      height: 4000px;
      border: 0;
    }
  </style>
</head>
<body>
  <pre id="results">loading...</pre>
  <iframe id="site" src="./index.html"></iframe>
  <script>
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
    const tests = [
      { hash: '#top', selector: '#top' },
      { hash: '#hours', selector: '#hours' },
      { hash: '#medical', selector: '#medical .section-title' },
      { hash: '#about', selector: '#about .section-title' },
      { hash: '#staff', selector: '#staff .section-title' },
      { hash: '#access', selector: '#access .section-title' },
    ];

    window.addEventListener('load', async () => {
      const iframe = document.getElementById('site');
      await new Promise((resolve) => iframe.addEventListener('load', resolve, { once: true }));

      const win = iframe.contentWindow;
      const doc = iframe.contentDocument;
      const lines = [];

      for (const test of tests) {
        win.location.hash = test.hash;
        await sleep(1000);

        const element = doc.querySelector(test.selector);
        const rect = element.getBoundingClientRect();
        lines.push(`${test.hash} -> top=${rect.top.toFixed(1)} scrollY=${win.scrollY}`);
      }

      document.getElementById('results').textContent = lines.join('\n');
    });
  </script>
</body>
</html>
